<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Produtos - Frango's Infinity</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100">
<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-logo">
            <span>🍗</span>
            <span>Frango's Infinity</span>
        </div>
        <div class="navbar-user">
            <span th:text="${usuarioNome}" class="font-medium"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="flex justify-between items-center mb-6">
        <h1>Gerenciar Produtos</h1>
        <button onclick="abrirModalCriar()" class="btn btn-primary">+ Novo Produto</button>
    </div>

    <div id="produtos-container">
        <div class="loading">Carregando produtos...</div>
    </div>
</div>

<!-- Modal Criar/Editar Produto -->
<div id="produtoModal" class="modal-overlay" style="display: none;">
    <div class="modal" style="max-width: 500px;">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Produto</h3>
            <button onclick="fecharModal()" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="produtoForm">
                <input type="hidden" id="produtoId">
                <div class="form-group">
                    <label class="form-label">Código</label>
                    <input type="text" id="codigo" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Descrição</label>
                    <textarea id="descricao" class="form-input" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Preço (R$)</label>
                    <input type="number" id="preco" class="form-input" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Tempo de Preparo (min)</label>
                    <input type="number" id="tempoPreparo" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Categoria</label>
                    <select id="categoriaId" class="form-input" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Estoque Inicial</label>
                    <input type="number" id="estoqueInicial" class="form-input" value="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Estoque Mínimo</label>
                    <input type="number" id="estoqueMinimo" class="form-input" value="5">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="disponivel" checked>
                    <label>Disponível</label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button onclick="fecharModal()" class="btn btn-secondary">Cancelar</button>
            <button onclick="salvarProduto()" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<script>
    let categorias = [];

    async function carregarProdutos() {
        const container = document.getElementById('produtos-container');
        container.innerHTML = '<div class="loading">Carregando produtos...</div>';

        try {
            const response = await fetch('/api/produtos', { credentials: 'include' });
            const produtos = await response.json();

            if (produtos.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">Nenhum produto cadastrado</div>';
                return;
            }

            container.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Categoria</th>
                                <th>Estoque</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${produtos.map(p => `
                                <tr>
                                    <td>${p.codigo}</td>
                                    <td>${p.nome}</td>
                                    <td>R$ ${p.preco.toFixed(2)}</td>
                                    <td>${p.nomeCategoria || '-'}</td>
                                    <td>${p.estoqueAtual || 0}</td>
                                    <td>
                                        <span class="badge ${p.disponivel ? 'badge-success' : 'badge-danger'}">
                                            ${p.disponivel ? 'Disponível' : 'Indisponível'}
                                        </span>
                                    </td>
                                    <td>
                                        <button onclick="editarProduto(${p.id})" class="btn btn-sm btn-primary">Editar</button>
                                        <button onclick="alternarDisponibilidade(${p.id}, ${!p.disponivel})" class="btn btn-sm btn-secondary">
                                            ${p.disponivel ? 'Desativar' : 'Ativar'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
        } catch (error) {
            console.error('Erro:', error);
            container.innerHTML = '<div class="text-center py-8 text-red-500">Erro ao carregar produtos</div>';
        }
    }

    async function carregarCategorias() {
        try {
            const response = await fetch('/api/produtos/categorias', { credentials: 'include' });
            categorias = await response.json();
            const select = document.getElementById('categoriaId');
            select.innerHTML = '<option value="">Selecione uma categoria</option>' +
                categorias.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        } catch (error) {
            console.error('Erro:', error);
        }
    }

    function abrirModalCriar() {
        document.getElementById('modalTitle').textContent = 'Novo Produto';
        document.getElementById('produtoForm').reset();
        document.getElementById('produtoId').value = '';
        document.getElementById('disponivel').checked = true;
        document.getElementById('produtoModal').style.display = 'flex';
    }

    async function editarProduto(id) {
        try {
            const response = await fetch(`/api/produtos/${id}`, { credentials: 'include' });
            const p = await response.json();

            document.getElementById('modalTitle').textContent = 'Editar Produto';
            document.getElementById('produtoId').value = p.id;
            document.getElementById('codigo').value = p.codigo;
            document.getElementById('nome').value = p.nome;
            document.getElementById('descricao').value = p.descricao || '';
            document.getElementById('preco').value = p.preco;
            document.getElementById('tempoPreparo').value = p.tempoPreparoMinuto || '';
            document.getElementById('categoriaId').value = p.categoriaId;
            document.getElementById('estoqueInicial').value = p.estoqueAtual || 0;
            document.getElementById('estoqueMinimo').value = 5;
            document.getElementById('disponivel').checked = p.disponivel;
            document.getElementById('produtoModal').style.display = 'flex';
        } catch (error) {
            alert('Erro ao carregar produto');
        }
    }

    async function salvarProduto() {
        const id = document.getElementById('produtoId').value;
        const data = {
            codigo: document.getElementById('codigo').value,
            nome: document.getElementById('nome').value,
            descricao: document.getElementById('descricao').value,
            preco: parseFloat(document.getElementById('preco').value),
            tempoPreparoMinuto: parseInt(document.getElementById('tempoPreparo').value) || 0,
            categoriaId: parseInt(document.getElementById('categoriaId').value),
            estoqueInicial: parseInt(document.getElementById('estoqueInicial').value) || 0,
            estoqueMinimo: parseInt(document.getElementById('estoqueMinimo').value) || 5,
            disponivel: document.getElementById('disponivel').checked
        };

        try {
            const url = id ? `/api/produtos/${id}` : '/api/produtos';
            const method = id ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                fecharModal();
                carregarProdutos();
            } else {
                alert('Erro ao salvar produto');
            }
        } catch (error) {
            alert('Erro ao salvar produto');
        }
    }

    async function alternarDisponibilidade(id, disponivel) {
        try {
            await fetch(`/api/produtos/${id}/disponibilidade?disponivel=${disponivel}`, {
                method: 'PATCH',
                credentials: 'include'
            });
            carregarProdutos();
        } catch (error) {
            alert('Erro ao alterar disponibilidade');
        }
    }

    function fecharModal() {
        document.getElementById('produtoModal').style.display = 'none';
    }

    carregarCategorias();
    carregarProdutos();
</script>
</body>
</html>
