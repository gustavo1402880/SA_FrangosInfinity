<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Usuários - Frango's Infinity</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100">
<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-logo">
            <span>🍗</span>
            <span>Frango's Infinity</span>
        </div>
        <div class="navbar-user">
            <span th:text="${usuarioNome}" class="font-medium"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="flex justify-between items-center mb-6">
        <h1>Gerenciar Usuários</h1>
        <button onclick="abrirModalCriar()" class="btn btn-primary">+ Novo Funcionário</button>
    </div>

    <div class="mb-4">
        <div class="flex gap-2">
            <button onclick="carregarUsuarios('FUNCIONARIO')" class="tab-btn btn">Funcionários</button>
            <button onclick="carregarUsuarios('CLIENTE')" class="tab-btn btn btn-secondary">Clientes</button>
        </div>
    </div>

    <div id="usuarios-container">
        <div class="loading">Carregando usuários...</div>
    </div>
</div>

<!-- Modal Criar/Editar Usuário -->
<div id="usuarioModal" class="modal-overlay" style="display: none;">
    <div class="modal" style="max-width: 500px;">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Funcionário</h3>
            <button onclick="fecharModal()" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="usuarioForm">
                <input type="hidden" id="usuarioId">
                <div class="form-group">
                    <label class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone</label>
                    <input type="text" id="telefone" class="form-input" placeholder="(XX) XXXXX-XXXX">
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nível de Acesso</label>
                    <select id="nivelAcesso" class="form-input">
                        <option value="ATENDENTE">Atendente</option>
                        <option value="COZINHEIRO">Cozinheiro</option>
                        <option value="CAIXA">Caixa</option>
                        <option value="ADMINISTRADOR">Administrador</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Turno</label>
                    <select id="turno" class="form-input">
                        <option value="MANHA">Manhã</option>
                        <option value="TARDE">Tarde</option>
                        <option value="NOITE">Noite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Salário</label>
                    <input type="number" id="salario" class="form-input" step="100">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button onclick="fecharModal()" class="btn btn-secondary">Cancelar</button>
            <button onclick="salvarUsuario()" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<script>
    let tipoAtual = 'FUNCIONARIO';

    async function carregarUsuarios(tipo) {
        tipoAtual = tipo;
        const container = document.getElementById('usuarios-container');
        container.innerHTML = '<div class="loading">Carregando usuários...</div>';

        try {
            const response = await fetch(`/api/usuarios/tipo/${tipo}`, { credentials: 'include' });
            const usuarios = await response.json();

            if (usuarios.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">Nenhum usuário encontrado</div>';
                return;
            }

            container.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr><th>ID</th><th>Nome</th><th>Email</th><th>Telefone</th><th>Nível</th><th>Status</th><th>Ações</th></tr>
                        </thead>
                        <tbody>
                            ${usuarios.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.nome}</td>
                                    <td>${u.email}</td>
                                    <td>${u.telefone || '-'}</td>
                                    <td>${u.nivelAcesso || '-'}</td>
                                    <td>
                                        <span class="badge ${u.ativo ? 'badge-success' : 'badge-danger'}">
                                            ${u.ativo ? 'Ativo' : 'Inativo'}
                                        </span>
                                    </td>
                                    <td>
                                        <button onclick="alternarStatus(${u.id}, ${!u.ativo})" class="btn btn-sm btn-secondary">
                                            ${u.ativo ? 'Desativar' : 'Ativar'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
        } catch (error) {
            container.innerHTML = '<div class="text-center py-8 text-red-500">Erro ao carregar usuários</div>';
        }
    }

    function abrirModalCriar() {
        document.getElementById('modalTitle').textContent = 'Novo Funcionário';
        document.getElementById('usuarioForm').reset();
        document.getElementById('usuarioId').value = '';
        document.getElementById('usuarioModal').style.display = 'flex';
    }

    async function salvarUsuario() {
        const data = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            senha: document.getElementById('senha').value,
            nivelAcesso: document.getElementById('nivelAcesso').value,
            turno: document.getElementById('turno').value,
            salario: parseFloat(document.getElementById('salario').value) || 0
        };

        try {
            const response = await fetch('/api/usuarios/funcionarios', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                fecharModal();
                carregarUsuarios(tipoAtual);
            } else {
                alert('Erro ao salvar usuário');
            }
        } catch (error) {
            alert('Erro ao salvar usuário');
        }
    }

    async function alternarStatus(id, ativo) {
        const endpoint = ativo ? 'ativar' : 'desativar';
        try {
            await fetch(`/api/usuarios/${id}/${endpoint}`, {
                method: 'PATCH',
                credentials: 'include'
            });
            carregarUsuarios(tipoAtual);
        } catch (error) {
            alert('Erro ao alterar status');
        }
    }

    function fecharModal() {
        document.getElementById('usuarioModal').style.display = 'none';
    }

    carregarUsuarios('FUNCIONARIO');
</script>
</body>
</html>
