<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Frango's Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-lg shadow-lg w-full max-w-md p-8">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-orange-600 mb-2">🍗 Frango's Infinity</h1>
        <p class="text-gray-600">Crie sua conta de cliente</p>
    </div>

    <div id="errorMsg" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-md text-sm"></div>
    <div id="successMsg" class="hidden mb-4 p-3 bg-green-100 text-green-700 rounded-md text-sm"></div>

    <form id="cadastroForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
            <input type="text" id="nome" name="nome" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <button type="submit"
                class="w-full bg-orange-600 hover:bg-orange-700 text-white font-medium py-2 px-4 rounded-md transition">
            Criar Conta
        </button>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
            Já tem conta?
            <a href="/login" class="text-orange-600 hover:underline">Fazer login</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const telefone = document.getElementById('telefone').value;
        const senha = document.getElementById('senha').value;

        try {
            const response = await fetch('/api/usuarios/clientes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, telefone, senha })
            });

            const data = await response.json();

            if (data.sucesso) {
                document.getElementById('successMsg').textContent = 'Conta criada com sucesso! Faça login para continuar.';
                document.getElementById('successMsg').classList.remove('hidden');
                document.getElementById('errorMsg').classList.add('hidden');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                document.getElementById('errorMsg').textContent = data.mensagem || 'Erro ao criar conta';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        } catch (error) {
            document.getElementById('errorMsg').textContent = 'Erro ao conectar com o servidor';
            document.getElementById('errorMsg').classList.remove('hidden');
        }
    });

    // Formata telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 2) {
            value = value.length ? `(${value}` : '';
        } else if (value.length <= 7) {
            value = `(${value.slice(0, 2)}) ${value.slice(2)}`;
        } else {
            value = `(${value.slice(0, 2)}) ${value.slice(2, 7)}-${value.slice(7, 11)}`;
        }
        e.target.value = value;
    });
</script>
</body>
</html>
