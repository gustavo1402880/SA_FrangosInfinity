<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos - Frango's Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100">
<nav class="bg-orange-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🍗</span>
            <span class="font-bold text-xl">Frango's Infinity</span>
        </div>
        <div class="flex items-center space-x-4">
            <span th:text="${usuarioNome}" class="font-medium"></span>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="bg-orange-700 hover:bg-orange-800 px-3 py-1 rounded transition">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">💰 Pagamentos</h1>

    <div id="pedidos-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-full text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-orange-600"></div>
            <p class="mt-2 text-gray-600">Carregando pedidos...</p>
        </div>
    </div>
</div>

<!-- Modal de Pagamento -->
<div id="paymentModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full">
        <h2 class="text-xl font-bold mb-4">Processar Pagamento</h2>
        <p class="text-lg font-bold text-center mb-4" id="modalValor">R$ 0,00</p>
        <p class="text-sm text-gray-600 text-center mb-4">Selecione a forma de pagamento:</p>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="selecionarPagamento('DINHEIRO')" class="payment-option p-4 rounded-lg border text-center hover:bg-gray-50">
                💵 Dinheiro
            </button>
            <button onclick="selecionarPagamento('CARTAO_DEBITO')" class="payment-option p-4 rounded-lg border text-center hover:bg-gray-50">
                💳 Débito
            </button>
            <button onclick="selecionarPagamento('CARTAO_CREDITO')" class="payment-option p-4 rounded-lg border text-center hover:bg-gray-50">
                💳 Crédito
            </button>
            <button onclick="selecionarPagamento('PIX')" class="payment-option p-4 rounded-lg border text-center hover:bg-gray-50">
                📱 PIX
            </button>
        </div>

        <div id="pixContainer" class="hidden text-center mb-4">
            <p class="text-sm text-gray-600 mb-2">Escaneie o QR Code abaixo:</p>
            <div id="qrCodeImage" class="flex justify-center"></div>
            <p id="codigoPix" class="text-xs text-gray-500 mt-2 break-all"></p>
        </div>

        <div class="flex gap-2">
            <button onclick="fecharModal()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-2 rounded">Cancelar</button>
            <button id="confirmarBtn" onclick="confirmarPagamento()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded">Confirmar</button>
        </div>
    </div>
</div>

<script>
    let pedidos = [];
    let selectedPedido = null;
    let selectedPagamento = null;
    let pixData = null;

    async function carregarPedidos() {
        try {
            const response = await fetch('/api/pedidos/subpedidos/status?status=PRONTO', { credentials: 'include' });
            pedidos = await response.json();

            const container = document.getElementById('pedidos-container');

            if (pedidos.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500">Nenhum pedido aguardando pagamento</div>';
                return;
            }

            container.innerHTML = pedidos.map(pedido => `
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg">Pedido #${pedido.numeroPedido || pedido.id}</h3>
                        <span class="text-xs text-gray-500">${formatarTempo(pedido.dataHora)}</span>
                    </div>
                    ${pedido.itens?.map(item => `
                        <p class="text-sm">${item.quantidade}x ${item.nomeProduto}</p>
                    `).join('') || '<p class="text-sm">Carregando...</p>'}
                    <p class="text-sm font-bold mt-2">Total: R$ ${pedido.valorTotal?.toFixed(2) || '0,00'}</p>
                    <button onclick="abrirModal(${pedido.id})" class="mt-3 w-full bg-orange-600 hover:bg-orange-700 text-white py-1 rounded text-sm">
                        Processar Pagamento
                    </button>
                </div>
            `).join('');

        } catch (error) {
            console.error('Erro:', error);
        }
    }

    function formatarTempo(dataHora) {
        const criacao = new Date(dataHora);
        const agora = new Date();
        const diffMs = agora - criacao;
        const minutos = Math.floor(diffMs / 60000);
        if (minutos < 60) return `${minutos} min`;
        return `${Math.floor(minutos / 60)}h ${minutos % 60}min`;
    }

    function abrirModal(pedidoId) {
        selectedPedido = pedidos.find(p => p.id === pedidoId);
        if (selectedPedido) {
            document.getElementById('modalValor').textContent = `R$ ${selectedPedido.valorTotal.toFixed(2)}`;
            document.getElementById('paymentModal').classList.remove('hidden');
            selectedPagamento = null;
            pixData = null;
            document.getElementById('pixContainer').classList.add('hidden');
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('ring-2', 'ring-orange-500');
            });
        }
    }

    function fecharModal() {
        document.getElementById('paymentModal').classList.add('hidden');
        selectedPedido = null;
        selectedPagamento = null;
    }

    function selecionarPagamento(tipo) {
        selectedPagamento = tipo;
        document.querySelectorAll('.payment-option').forEach(opt => {
            opt.classList.remove('ring-2', 'ring-orange-500');
        });
        event.target.closest('.payment-option').classList.add('ring-2', 'ring-orange-500');

        if (tipo === 'PIX') {
            document.getElementById('pixContainer').classList.remove('hidden');
            gerarPix();
        } else {
            document.getElementById('pixContainer').classList.add('hidden');
        }
    }

    async function gerarPix() {
        try {
            const pagamentoResp = await fetch('/api/pagamentos', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subPedidoId: selectedPedido.id,
                    valor: selectedPedido.valorTotal,
                    tipo: 'PIX'
                })
            });
            const pagamento = await pagamentoResp.json();

            const pixResp = await fetch('/api/pagamentos/pix', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    pagamentoId: pagamento.id,
                    tempoExpiracaoSegundos: 300
                })
            });
            pixData = await pixResp.json();

            if (pixData.sucesso && pixData.qrCode) {
                document.getElementById('qrCodeImage').innerHTML = `<img src="${pixData.qrCode}" class="w-48 h-48 mx-auto" />`;
                document.getElementById('codigoPix').textContent = pixData.codigoCopiaCola || '';
            }
        } catch (error) {
            console.error('Erro ao gerar PIX:', error);
        }
    }

    async function confirmarPagamento() {
        if (!selectedPagamento) {
            alert('Selecione uma forma de pagamento');
            return;
        }

        try {
            const pagamentoResp = await fetch('/api/pagamentos', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    subPedidoId: selectedPedido.id,
                    valor: selectedPedido.valorTotal,
                    tipo: selectedPagamento
                })
            });
            const pagamento = await pagamentoResp.json();

            await fetch(`/api/pagamentos/${pagamento.id}/confirmar`, {
                method: 'PATCH',
                credentials: 'include'
            });

            alert('Pagamento realizado com sucesso!');
            fecharModal();
            carregarPedidos();

        } catch (error) {
            console.error('Erro:', error);
            alert('Erro ao processar pagamento');
        }
    }

    setInterval(carregarPedidos, 15000);
    carregarPedidos();
</script>
</body>
</html>
