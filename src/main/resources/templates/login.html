<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Frango's Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-lg shadow-lg w-full max-w-md p-8">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-orange-600 mb-2">🍗 Frango's Infinity</h1>
        <p class="text-gray-600">Sistema de Gestão de Lanchonete</p>
    </div>

    <div th:if="${error}" class="mb-4 p-3 bg-red-100 text-red-700 rounded-md text-sm">
        <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="mb-4 p-3 bg-green-100 text-green-700 rounded-md text-sm">
        <span th:text="${message}"></span>
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" name="senha" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <button type="submit"
                class="w-full bg-orange-600 hover:bg-orange-700 text-white font-medium py-2 px-4 rounded-md transition">
            Entrar
        </button>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
            Ainda não tem conta?
            <a href="/cadastro" class="text-orange-600 hover:underline">Cadastre-se</a>
        </p>
    </div>
</div>
</body>
</html>
