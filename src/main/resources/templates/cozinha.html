<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Cozinha - Frango's Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100">
<nav class="bg-orange-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🍗</span>
            <span class="font-bold text-xl">Frango's Infinity</span>
        </div>
        <div class="flex items-center space-x-4">
            <span th:text="${usuarioNome}" class="font-medium"></span>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="bg-orange-700 hover:bg-orange-800 px-3 py-1 rounded transition">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">👨‍🍳 Painel da Cozinha</h1>

    <div class="grid lg:grid-cols-2 gap-6">
        <!-- Aguardando Preparo -->
        <div class="space-y-4">
            <h2 class="text-lg font-semibold flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                Aguardando Preparo <span id="confirmados-count" class="text-sm text-gray-500"></span>
            </h2>
            <div id="confirmados-container" class="space-y-3"></div>
        </div>

        <!-- Em Preparo -->
        <div class="space-y-4">
            <h2 class="text-lg font-semibold flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-orange-500"></span>
                Em Preparo <span id="preparo-count" class="text-sm text-gray-500"></span>
            </h2>
            <div id="preparo-container" class="space-y-3"></div>
        </div>
    </div>
</div>

<script>
    async function carregarPedidos() {
        try {
            // Carregar pedidos confirmados
            const confirmadosResp = await fetch('/api/pedidos/subpedidos/status?status=CONFIMADO', { credentials: 'include' });
            const confirmados = await confirmadosResp.json();

            // Carregar pedidos em preparo
            const preparoResp = await fetch('/api/pedidos/subpedidos/status?status=EM_PREPARO', { credentials: 'include' });
            const preparo = await preparoResp.json();

            document.getElementById('confirmados-count').textContent = `(${confirmados.length})`;
            document.getElementById('preparo-count').textContent = `(${preparo.length})`;

            // Renderizar confirmados
            const confirmadosContainer = document.getElementById('confirmados-container');
            if (confirmados.length === 0) {
                confirmadosContainer.innerHTML = '<p class="text-gray-500 text-center py-4">Nenhum pedido aguardando</p>';
            } else {
                confirmadosContainer.innerHTML = confirmados.map(pedido => `
                        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold">Pedido #${pedido.numeroPedido || pedido.id}</h3>
                                <span class="text-xs text-gray-500">${formatarTempo(pedido.dataHora)}</span>
                            </div>
                            ${pedido.itens?.map(item => `
                                <p class="text-sm">${item.quantidade}x ${item.nomeProduto}</p>
                            `).join('') || '<p class="text-sm">Carregando...</p>'}
                            <button onclick="iniciarPreparo(${pedido.id})" class="mt-3 w-full bg-blue-500 hover:bg-blue-600 text-white py-1 rounded text-sm">
                                Iniciar Preparo
                            </button>
                        </div>
                    `).join('');
            }

            // Renderizar em preparo
            const preparoContainer = document.getElementById('preparo-container');
            if (preparo.length === 0) {
                preparoContainer.innerHTML = '<p class="text-gray-500 text-center py-4">Nenhum pedido em preparo</p>';
            } else {
                preparoContainer.innerHTML = preparo.map(pedido => `
                        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-orange-500">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold">Pedido #${pedido.numeroPedido || pedido.id}</h3>
                                <span class="text-xs text-gray-500">${formatarTempo(pedido.dataHora)}</span>
                            </div>
                            ${pedido.itens?.map(item => `
                                <p class="text-sm">${item.quantidade}x ${item.nomeProduto}</p>
                            `).join('') || '<p class="text-sm">Carregando...</p>'}
                            <button onclick="marcarPronto(${pedido.id})" class="mt-3 w-full bg-green-500 hover:bg-green-600 text-white py-1 rounded text-sm">
                                ✓ Marcar Pronto
                            </button>
                        </div>
                    `).join('');
            }

        } catch (error) {
            console.error('Erro:', error);
        }
    }

    function formatarTempo(dataHora) {
        const criacao = new Date(dataHora);
        const agora = new Date();
        const diffMs = agora - criacao;
        const minutos = Math.floor(diffMs / 60000);
        if (minutos < 60) return `${minutos} min`;
        return `${Math.floor(minutos / 60)}h ${minutos % 60}min`;
    }

    async function iniciarPreparo(id) {
        try {
            const response = await fetch(`/api/pedidos/subpedidos/${id}/preparar`, {
                method: 'PATCH',
                credentials: 'include'
            });
            if (response.ok) {
                carregarPedidos();
            } else {
                alert('Erro ao iniciar preparo');
            }
        } catch (error) {
            alert('Erro ao iniciar preparo');
        }
    }

    async function marcarPronto(id) {
        try {
            const response = await fetch(`/api/pedidos/subpedidos/${id}/pronto`, {
                method: 'PATCH',
                credentials: 'include'
            });
            if (response.ok) {
                carregarPedidos();
            } else {
                alert('Erro ao marcar pronto');
            }
        } catch (error) {
            alert('Erro ao marcar pronto');
        }
    }

    setInterval(carregarPedidos, 10000);
    carregarPedidos();
</script>
</body>
</html>
